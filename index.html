<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unblocked Fantasy</title>

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="dns-prefetch" href="https://www.googletagmanager.com">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:var(--bg,#0a0a0a);
font-family:'Inter',-apple-system,sans-serif;
}

.loading-screen{
position:fixed;
inset:0;
background:rgba(10,10,10,0.6);
backdrop-filter:blur(15px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:10000;
}

.loading-screen.hidden{
opacity:0;
visibility:hidden;
pointer-events:none;
transition:opacity .5s ease,visibility .5s;
}

.loading-logo{
font-size:2.5rem;
font-weight:700;
margin-bottom:24px;
display:flex;
align-items:center;
gap:14px;
}

.loading-logo span{
background:linear-gradient(90deg,#e4e4e7 0%,#a1a1aa 40%,#52525b 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loading-spinner{
width:40px;
height:40px;
border:3px solid #1f1f1f;
border-top-color:#71717a;
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.loading-text{
margin-top:16px;
color:#52525b;
font-size:.875rem;
}

.launch-screen{
position:fixed;
inset:0;
background:rgba(10,10,10,0.6);
backdrop-filter:blur(15px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.launch-screen.hidden{
display:none;
}

.launch-button{
background:var(--surface);
color:#a1a1aa;
border:none;
padding:24px 48px;
border-radius:12px;
font-size:1.25rem;
font-weight:600;
cursor:pointer;
transition:opacity .2s;
margin-top:16px;
width:100%;
max-width:300px;
opacity:.75;
}

.launch-button:hover{
opacity:.5;
}

iframe{
width:100%;
height:100%;
border:none;
}

#panic-overlay{
position:fixed;
inset:0;
background:white;
z-index:99999;
display:none;
}

</style>

<script src="config.js" defer></script>
<script src="scripts/notifications.js" defer></script>
<script src="scripts/settings.js" defer></script>
<script src="scripts/background.js" defer></script>
<script src="scripts/cloaking.js" defer></script>
<script src="scripts/quotes.js" defer></script>

<link rel="stylesheet" href="styles/error.css">
<link rel="stylesheet" href="styles/background.css">

</head>

<body>

<div id="fv-cloak" class="neterror">

<div id="main-frame-error" class="interstitial-wrapper">

<div id="main-content">

<div class="icon icon-generic"></div>

<div id="main-message">

<h1>
<span>This site can’t be reached</span>
</h1>

<p>
<strong id="origin-text"></strong>'s DNS address could not be found.
Diagnosing the problem.
</p>

<div class="error-code">
DNS_PROBE_POSSIBLE
</div>

</div>
</div>

<div id="buttons" class="nav-wrapper suggested-left">
<div id="control-buttons">
<button id="reload-button" class="text-button" onclick="location.reload()">Reload</button>
</div>
</div>

</div>

<script>

const origin = window.location.hostname || "This site";
document.getElementById("origin-text").textContent = origin;

try{

const STORAGE_KEY='phantom_fv';
const hasBypassed=localStorage.getItem(STORAGE_KEY);
const urlParams=new URLSearchParams(window.location.search);
const isFakeMode=urlParams.has('fake');

if(window.SITE_CONFIG.firstVisitCloak && !hasBypassed && !isFakeMode){

const overlay=document.getElementById('fv-cloak');

if(overlay)overlay.style.display='block';

document.title=origin;

document.getElementById('reload-button').onclick=function(){

localStorage.setItem(STORAGE_KEY,'true');

overlay.style.display='none';

document.getElementById('main-frame').src='index2.html';

document.title='Unblocked Fantasy';

};

}else{

document.getElementById('main-frame').src='index2.html';

}

}catch(e){}

</script>

</div>

<div id="loading-screen" class="loading-screen">

<div class="loading-logo">
<i class="fa-solid fa-wand-magic-sparkles"></i>
<span>Unblocked Fantasy</span>
</div>

<div class="loading-spinner"></div>

<div class="loading-text">Loading...</div>

</div>

<div id="launch-screen" class="launch-screen hidden">

<div class="loading-logo">
<i class="fa-solid fa-wand-magic-sparkles"></i>
<span>Unblocked Fantasy</span>
</div>

<button id="launch-button" class="launch-button">
Launch Unblocked Fantasy
</button>

</div>

<div id="panic-overlay"></div>

<iframe id="main-frame"></iframe>

<script>

const loadingScreen=document.getElementById('loading-screen');
const iframe=document.getElementById('main-frame');

function hideLoading(){
loadingScreen.classList.add('hidden');
}

iframe.addEventListener('load',hideLoading);

</script>

</body>
</html>
